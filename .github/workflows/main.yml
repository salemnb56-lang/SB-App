name: Build Android APK from ZIP
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # تم تحديثه إلى v4

      - name: Unzip project files
        run: unzip "كل الملفات.zip" -d .

      - name: set up JDK 17
        uses: actions/setup-java@v4 # تم تحديثه إلى v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4 # هذا هو التعديل الأهم للنسخة v4
        with:
          name: My-App-APK
          path: app/build/outputs/apk/debug/*.apk
