name: Build Android APK from ZIP
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip and Organize Files # فك الضغط وتنظيم الملفات
        run: |
          unzip "كل الملفات.zip" -d temp_extract
          # نقل الملفات من المجلد الفرعي للمجلد الرئيسي إذا وجدت
          find temp_extract -maxdepth 2 -name "gradlew" -execdir mv ./* ../../ \; || true
          # إعطاء صلاحيات التشغيل
          chmod +x gradlew || echo "Warning: gradlew not found yet"

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-APK
          path: "**/build/outputs/apk/debug/*.apk"
