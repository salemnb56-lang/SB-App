name: Build Android APK from ZIP
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip and Rescue Files # فك الضغط والبحث عن الملفات
        run: |
          # نستخدم *.zip للتعامل مع أي ملف مضغوط بغض النظر عن اسمه العربي
          unzip -o "*.zip" -d extracted_files
          
          # البحث عن المجلد الذي يحتوي على ملف gradlew ونقل محتوياته للمجلد الرئيسي
          PROJECT_ROOT=$(find extracted_files -name "gradlew" -exec dirname {} \;)
          if [ -n "$PROJECT_ROOT" ]; then
            echo "تم العثور على المشروع في: $PROJECT_ROOT"
            cp -r $PROJECT_ROOT/. .
          else
            echo "خطأ: لم نجد ملفات الأندرويد الأصلية داخل الملف المضغوط!"
            ls -R extracted_files
            exit 1
          fi
          
          # إعطاء صلاحية التشغيل للمحرك
          chmod +x gradlew

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MobileApp-Final
          path: "**/build/outputs/apk/debug/*.apk"
